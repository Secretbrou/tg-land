    <!-- Tracker URL builder -->
    <script>
      const _p = new URLSearchParams(window.location.search);
      const _keys = ["b","pixel","gclid","ad_name","ad_id","campaign_id","adset_name","site_source_name","placement"];
      const _query = _keys
        .filter(k => _p.has(k))
        .map(k => `${k}=${encodeURIComponent(_p.get(k))}`)
        .join("&");
      const TRACKER_URL = "https://thedinator.com/tracker/spots/redirect/VeUFdCl0" + (_query ? "?" + _query : "");
    </script>
</head>
<body>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P6Z38TDB"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <header>
        <div class="container">
            <img src="https://api.mvpproject.io/static/images/tg_logo.svg" alt="" class="logo">
            <button onclick="location.href='https://telegram.org';">Download</button>
        </div>
    </header>

    <main>
        <div class="banner">
            <div class="text">
                <a class="redir" href="#"><img src="ava.jpg" alt=""></a>
                <a class="title">dk.club</a>
                <div class="members">519 members</div>
                <div class="description">
                    Привіт. Мене звати Даніель, і це моє комьюніті
                    <p>🔸Безкоштовне навчання</p>
                    <p>🔸Понад 500 учасників спільноти</p>
                    <p>🔸Актуальні результати, аналітика та огляди ринку</p>
                </div>
            </div>
            <div class="buttons">
                <a href="#" class="blue redir">View in Telegram</a>
            </div>
        </div>
    </main>

    <script>
        // Обновляем все ссылки .redir на TRACKER_URL
        document.querySelectorAll('.redir').forEach(el => {
            el.setAttribute('href', TRACKER_URL);
        });

        // Логика Cookie FBP
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function add_fbp() {
            const fbpCookie = getCookie('_fbp');
            if (fbpCookie) {
                document.querySelectorAll('.redir').forEach(element => {
                    const href = element.getAttribute('href');
                    if (href && href !== "#") {
                        const separator = href.includes('?') ? '&' : '?';
                        element.setAttribute('href', `${href}${separator}fbp=${fbpCookie}`);
                    }
                });
            } else {
                setTimeout(add_fbp, 100);
            }
        }
        document.addEventListener("DOMContentLoaded", add_fbp);
    </script>
</body>
